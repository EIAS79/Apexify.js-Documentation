<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" width="960" height="220" role="img" aria-label="Apexify.js  Programmatic visual library for Node.js">
  <defs>
    <linearGradient id="bnd-sunset" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3D7F"/>
      <stop offset="55%" stop-color="#FF7A5A"/>
      <stop offset="100%" stop-color="#FFB84F"/>
    </linearGradient>
    <linearGradient id="bnd-iris-glow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#7C5CFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bnd-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="bnd-dot" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE9D6"/>
    </radialGradient>
    <linearGradient id="bnd-wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="50%" stop-color="#FF3D7F"/>
      <stop offset="100%" stop-color="#FFB84F"/>
    </linearGradient>
    <filter id="bnd-icon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(40, 50)">
    <rect width="120" height="120" rx="26" fill="url(#bnd-sunset)" filter="url(#bnd-icon-glow)"/>
    <rect width="120" height="120" rx="26" fill="url(#bnd-iris-glow)"/>
    <path d="M 60 24 L 96 60 L 60 96 L 24 60 Z" fill="url(#bnd-shine)"/>
    <path d="M 60 38 L 82 60 L 60 82 L 38 60 Z" fill="url(#bnd-sunset)"/>
    <circle cx="60" cy="60" r="9" fill="url(#bnd-dot)"/>
  </g>

  <text x="200" y="118" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="900" letter-spacing="-2" fill="url(#bnd-wordmark)">Apexify.js</text>

  <text x="202" y="156" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" letter-spacing="0.4" fill="#B9A9E8">Programmatic visual library for Node.js</text>

  <g transform="translate(202, 178)">
    <rect width="120" height="22" rx="11" fill="#1F1245" stroke="#3A2A5C" stroke-width="1"/>
    <circle cx="14" cy="11" r="3" fill="#FF3D7F"/>
    <text x="26" y="16" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#F5F0FF" letter-spacing="0.5">npm i apexify.js</text>
  </g>
</svg>

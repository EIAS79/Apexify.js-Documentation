<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" width="960" height="220" role="img" aria-label="Apexify.js  Programmatic visual library for Node.js">
  <defs>
    <linearGradient id="bnl-sunset" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3D7F"/>
      <stop offset="55%" stop-color="#FF7A5A"/>
      <stop offset="100%" stop-color="#FFB84F"/>
    </linearGradient>
    <linearGradient id="bnl-iris-glow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#7C5CFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bnl-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.78"/>
    </linearGradient>
    <radialGradient id="bnl-dot" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE9D6"/>
    </radialGradient>
    <linearGradient id="bnl-wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A2A5C"/>
      <stop offset="60%" stop-color="#1A0F3D"/>
      <stop offset="100%" stop-color="#3A2A5C"/>
    </linearGradient>
  </defs>

  <g transform="translate(40, 50)">
    <rect width="120" height="120" rx="26" fill="url(#bnl-sunset)"/>
    <rect width="120" height="120" rx="26" fill="url(#bnl-iris-glow)"/>
    <path d="M 60 24 L 96 60 L 60 96 L 24 60 Z" fill="url(#bnl-shine)"/>
    <path d="M 60 38 L 82 60 L 60 82 L 38 60 Z" fill="url(#bnl-sunset)"/>
    <circle cx="60" cy="60" r="9" fill="url(#bnl-dot)"/>
  </g>

  <text x="200" y="118" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="900" letter-spacing="-2" fill="url(#bnl-wordmark)">Apexify.js</text>

  <text x="202" y="156" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" letter-spacing="0.4" fill="#5A4F7A">Programmatic visual library for Node.js</text>

  <g transform="translate(202, 178)">
    <rect width="120" height="22" rx="11" fill="#FFFFFF" stroke="#E5DDF5" stroke-width="1"/>
    <circle cx="14" cy="11" r="3" fill="#FF3D7F"/>
    <text x="26" y="16" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#1A0F3D" letter-spacing="0.5">npm i apexify.js</text>
  </g>
